name: CI - Windows Only

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: TypeScript check
        run: bunx tsc --noEmit

  build-frontend:
    runs-on: windows-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js frontend (static export for Tauri)
        run: bun run build
        env:
          NODE_ENV: production
          NEXT_STATIC_EXPORT: "true"

  rust-check:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Install Vulkan SDK (required for llama.cpp)
        shell: powershell
        run: |
          $installerUrl = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          $installerPath = "$env:TEMP\vulkan-sdk.exe"
          
          Write-Host "Downloading Vulkan SDK..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          
          Write-Host "Installing Vulkan SDK silently..."
          Start-Process -FilePath $installerPath -ArgumentList "--accept-licenses --default-answer --confirm-command install" -NoNewWindow -Wait
          
          $vulkanSdkPath = "C:\VulkanSDK"
          $latestVersion = (Get-ChildItem $vulkanSdkPath | Sort-Object -Descending | Select-Object -First 1).Name
          $vulkanPath = "$vulkanSdkPath\$latestVersion"
          
          Write-Host "Vulkan SDK installed at: $vulkanPath"
          echo "VULKAN_SDK=$vulkanPath" >> $env:GITHUB_ENV
          echo "$vulkanPath\Bin" >> $env:GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Run Clippy
        run: cd src-tauri && cargo clippy --all-features -- -D warnings || true

      - name: Check Rust compilation
        run: cd src-tauri && cargo check --all-features
