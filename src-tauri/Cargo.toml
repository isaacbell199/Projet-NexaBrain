[package]
name = "nexastory"
version = "0.3.0"
description = "NexaStory - AI-powered creative writing assistant"
authors = ["NexaStory Team"]
edition = "2021"
license = "MIT"
repository = "https://github.com/nexastory/nexastory"
homepage = "https://nexastory.app"
readme = "README.md"
keywords = ["ai", "llm", "writing", "creative", "tauri"]
categories = ["text-processing", "gui"]

[lib]
name = "nexastory_lib"
path = "src/lib.rs"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
walkdir = "2"
sysinfo = "0.32"
thiserror = "1"
anyhow = "1"
log = "0.4"
env_logger = "0.11"
parking_lot = "0.12"
once_cell = "1"
num_cpus = "1"
regex = "1"
encoding_rs = "0.8"

# ============================================================================
# LLAMA.CPP INTEGRATION - VERSION LOCKED
# ============================================================================
# ⚠️ CRITICAL: DO NOT MODIFY THIS VERSION NUMBER ⚠️
# Version =0.1.142 - LOCKED for stability and model compatibility
# The "=" prefix locks the exact version to prevent any updates
# Supports: LLaMA 3.x, Mistral, Qwen 2.x, Gemma 2, Phi-3, Yi, etc.
# ============================================================================
[dependencies]
# ...
llama-cpp-2 = { version = "=0.1.143", optional = true }
llama-cpp-sys-2 = { version = "=0.1.143", optional = true }

[features]
default = ["llama-native"]
llama-native = ["dep:llama-cpp-2"]
llama-cuda = ["dep:llama-cpp-2", "llama-cpp-2/cuda"]
llama-metal = ["dep:llama-cpp-2", "llama-cpp-2/metal"]
llama-vulkan = ["dep:llama-cpp-2", "llama-cpp-2/vulkan"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = 3
strip = true
